<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Регистрация</h1>
        <form id="registration-form" action="#" method="post">
            <div class="form-group">
                <label for="first-name">Имя:</label>
                <input type="text" id="first-name" name="first-name" placeholder="Введите имя" required>
                <div id="first-name-error" class="error-message"></div>
            </div>
            <div class="form-group">
                <label for="last-name">Фамилия:</label>
                <input type="text" id="last-name" name="last-name" placeholder="Введите фамилию" required>
                <div id="last-name-error" class="error-message"></div>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="example@domain.com" required>
                <div id="email-error" class="error-message"></div>
            </div>
            <div class="form-group">
                <label for="password">Пароль:</label>
                <input type="password" id="password" name="password" placeholder="Не менее 8 символов" required>
                <div id="password-error" class="error-message"></div>
            </div>
            <div class="form-group">
                <label for="password-confirm">Подтверждение пароля:</label>
                <input type="password" id="password-confirm" name="password-confirm" placeholder="Повторите пароль" required>
                <div id="password-confirm-error" class="error-message"></div>
            </div>
            <div class="form-group">
                <label for="birth-day">Дата рождения:</label>
                <input type="date" id="birth-day" name="birth-day" required>
                <div id="birth-day-error" class="error-message"></div>
            </div>
            <button type="submit" id="form-button" disabled>Отправить</button>
        </form>
    </div>
    <script src="js/core.js"></script>
    <script src="js/validators.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/events.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
